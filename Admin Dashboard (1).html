// ─── Mini Sparkline ─────────────────────────────────────────
const Sparkline = ({ data, color, height = 40 }) => {
  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * 120;
    const y = height - ((v - min) / (max - min + 1)) * (height - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width="120" height={height} style={{ overflow: 'visible' }}>
      <defs>
        <linearGradient id={`sg-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.4"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`0,${height} ${pts} 120,${height}`}
        fill={`url(#sg-${color.replace('#','')})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

// ─── Bar Chart ──────────────────────────────────────────────
const BarChart = ({ data, colors }) => {
  const max = Math.max(...data.map(d => d.value));
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8, height: 100 }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <div style={{ fontSize: 10, color: C.textDim, fontWeight: 600 }}>{d.value}</div>
          <div style={{
            width: '100%', borderRadius: '6px 6px 0 0',
            height: `${(d.value / max) * 80}px`,
            background: colors[i % colors.length],
            opacity: 0.85,
            transition: 'height 0.3s',
          }}/>
          <div style={{ fontSize: 9, color: C.textMuted, textAlign: 'center' }}>{d.label}</div>
        </div>
      ))}
    </div>
  );
};

// ─── Donut Chart ─────────────────────────────────────────────
const DonutChart = ({ slices, size = 100 }) => {
  const total = slices.reduce((a, s) => a + s.value, 0);
  let offset = 0;
  const r = 38, cx = 50, cy = 50, circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.surfaceHigh} strokeWidth="12"/>
      {slices.map((s, i) => {
        const pct = s.value / total;
        const dash = pct * circ;
        const gap = circ - dash;
        const el = (
          <circle key={i} cx={cx} cy={cy} r={r}
            fill="none" stroke={s.color} strokeWidth="12"
            strokeDasharray={`${dash} ${gap}`}
            strokeDashoffset={-offset * circ / 360 * (360)}
            transform={`rotate(${-90 + offset * 360} ${cx} ${cy})`}
            strokeLinecap="butt"
          />
        );
        offset += pct;
        return el;
      })}
    </svg>
  );
};

// ─── Line Chart ──────────────────────────────────────────────
const LineChart = ({ datasets, labels, height = 140 }) => {
  const allVals = datasets.flatMap(d => d.data);
  const max = Math.max(...allVals) * 1.1, min = 0;
  const W = 500, H = height;
  const px = (i) => (i / (labels.length - 1)) * (W - 40) + 20;
  const py = (v) => H - 20 - ((v - min) / (max - min)) * (H - 30);

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H+10}`} preserveAspectRatio="none" style={{ overflow: 'visible' }}>
      {/* grid lines */}
      {[0,0.25,0.5,0.75,1].map((t,i) => (
        <line key={i} x1={20} y1={py(t*(max-min))} x2={W-20} y2={py(t*(max-min))}
          stroke={C.border} strokeWidth="1"/>
      ))}
      {/* x labels */}
      {labels.map((l, i) => (
        <text key={i} x={px(i)} y={H+6} textAnchor="middle"
          fontSize="9" fill={C.textMuted} fontFamily="Outfit">{l}</text>
      ))}
      {/* lines */}
      {datasets.map((ds, di) => {
        const pts = ds.data.map((v,i) => `${px(i)},${py(v)}`).join(' ');
        const areaBot = `${px(0)},${py(0)} ${ds.data.map((v,i) => `${px(i)},${py(v)}`).join(' ')} ${px(ds.data.length-1)},${py(0)}`;
        return (
          <g key={di}>
            <defs>
              <linearGradient id={`lg${di}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={ds.color} stopOpacity="0.3"/>
                <stop offset="100%" stopColor={ds.color} stopOpacity="0"/>
              </linearGradient>
            </defs>
            <polygon points={areaBot} fill={`url(#lg${di})`}/>
            <polyline points={pts} fill="none" stroke={ds.color} strokeWidth="2.5"
              strokeLinecap="round" strokeLinejoin="round"/>
            {ds.data.map((v,i) => (
              <circle key={i} cx={px(i)} cy={py(v)} r="3"
                fill={ds.color} stroke={C.surface} strokeWidth="2"/>
            ))}
          </g>
        );
      })}
    </svg>
  );
};

      {[{c: C.red, l:'High'},{c: C.amber, l:'Medium'},{c: C.green, l:'Low'}].map((item,i)=>(

      ))}

};

// ─── Fake Detection Page ───────────────────────────────────────
const FakeDetectionPage = () => {
  const [warned, setWarned] = useState([]);
  const [banned, setBanned] = useState([]);
  const flagged = [
    { name:'Rashid Mehmood', block:'Block B', unit:'B-08', fakeCount:7, totalComplaints:9, pattern:'Repetitive low-detail submissions, 3 marked invalid by AI', riskScore:92, initials:'RM' },
    { name:'Zahid Ali', block:'Block C', unit:'C-14', fakeCount:5, totalComplaints:8, pattern:'GPS spoofing detected on 4 complaints', riskScore:84, initials:'ZA' },
    { name:'Sana Butt', block:'Block A', unit:'A-22', fakeCount:4, totalComplaints:7, pattern:'Duplicate complaints submitted within minutes', riskScore:76, initials:'SB' },
    { name:'Tariq Javed', block:'Block E', unit:'E-03', fakeCount:3, totalComplaints:10, pattern:'AI confidence below 40% on 3 submissions', riskScore:61, initials:'TJ' },
    { name:'Hina Qureshi', block:'Block D', unit:'D-07', fakeCount:2, totalComplaints:6, pattern:'Same photo used on 2 different complaints', riskScore:48, initials:'HQ' },
  ];
  const riskColor = s => s>=80?C.red:s>=60?C.amber:C.green;
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{
        padding:'14px 18px', background:C.amberGlow, border:`1px solid ${C.amber}44`, borderRadius:12,
        display:'flex', alignItems:'center', gap:12,
      }}>
        <span style={{ fontSize:20 }}>⊘</span>
        <div>
          <div style={{ fontSize:13, fontWeight:700, color:C.amber }}>5 Users Flagged by AI Behavior Tracking</div>
          <div style={{ fontSize:11, color:C.textDim }}>Repeated fake or invalid complaint patterns detected</div>
        </div>
      </div>
      <div style={{ display:'flex', gap:16 }}>
        {[
          { label:'Total Flagged', value:'5', color:C.amber },
          { label:'Warnings Issued', value:warned.length.toString(), color:C.primary },
          { label:'Accounts Banned', value:banned.length.toString(), color:C.red },
          { label:'Fake Rate (system)', value:'6.2%', color:C.teal },
        ].map((s,i)=>(
          <Card key={i} style={{ flex:1, padding:'14px 18px' }}>
            <div style={{ fontSize:11, color:C.textMuted, fontWeight:600, textTransform:'uppercase', letterSpacing:0.8 }}>{s.label}</div>
            <div style={{ fontSize:28, fontWeight:800, color:s.color, marginTop:4 }}>{s.value}</div>
          </Card>
        ))}
      </div>
      <Card>
        <div style={{ fontSize:14, fontWeight:700, color:C.text, marginBottom:14 }}>Flagged Users</div>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {flagged.map((u,i)=>{
            const isWarned = warned.includes(i);
            const isBanned = banned.includes(i);
            return (
              <div key={i} style={{
                padding:'16px', borderRadius:14, background:C.surfaceHigh,
                border:`1px solid ${isBanned?C.red+'44':isWarned?C.amber+'33':C.border}`,
                opacity: isBanned ? 0.7 : 1,
              }}>
                <div style={{ display:'flex', alignItems:'flex-start', gap:14 }}>
                  <div style={{
                    width:44, height:44, borderRadius:12,
                    background:riskColor(u.riskScore)+'22', color:riskColor(u.riskScore),
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:13, fontWeight:700, flexShrink:0,
                  }}>{u.initials}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
                      <div>
                        <span style={{ fontSize:14, fontWeight:700, color:C.text }}>{u.name}</span>
                        <span style={{ fontSize:11, color:C.textMuted, marginLeft:8 }}>{u.block} · {u.unit}</span>
                      </div>
                      <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                        {isBanned && <Badge color={C.red}>Banned</Badge>}
                        {isWarned && !isBanned && <Badge color={C.amber}>Warned</Badge>}
                        <div style={{
                          padding:'4px 12px', borderRadius:20, fontSize:11, fontWeight:800,
                          background:riskColor(u.riskScore)+'22', color:riskColor(u.riskScore),
                          border:`1px solid ${riskColor(u.riskScore)}44`,
                        }}>Risk {u.riskScore}%</div>
                      </div>
                    </div>
                    <div style={{ fontSize:11, color:C.textMuted, marginBottom:6 }}>
                      <span style={{ color:C.red, fontWeight:700 }}>{u.fakeCount} fake</span> / {u.totalComplaints} total complaints
                    </div>
                    <div style={{ fontSize:11, color:C.textDim, lineHeight:1.5, marginBottom:10,
                      padding:'6px 10px', background:C.bg, borderRadius:8,
                    }}>⊘ {u.pattern}</div>
                    {!isBanned && (
                      <div style={{ display:'flex', gap:8 }}>
                        {!isWarned ? (
                          <button onClick={()=>setWarned(w=>[...w,i])} style={{
                            padding:'6px 14px', borderRadius:8, border:`1px solid ${C.amber}44`,
                            background:C.amberGlow, color:C.amber,
                            fontFamily:'Outfit', fontSize:12, fontWeight:600, cursor:'pointer',
                          }}>Issue Warning</button>
                        ) : (
                          <button style={{
                            padding:'6px 14px', borderRadius:8, border:`1px solid ${C.amber}44`,
                            background:C.amberGlow, color:C.amber,
                            fontFamily:'Outfit', fontSize:12, fontWeight:600, cursor:'default', opacity:0.7,
                          }}>Warning Sent ✓</button>
                        )}
                        <button onClick={()=>setBanned(b=>[...b,i])} style={{
                          padding:'6px 14px', borderRadius:8, border:`1px solid ${C.red}44`,
                          background:C.redGlow, color:C.red,
                          fontFamily:'Outfit', fontSize:12, fontWeight:600, cursor:'pointer',
                        }}>Suspend Account</button>
                        <button style={{
                          padding:'6px 14px', borderRadius:8, border:`1px solid ${C.border}`,
                          background:'transparent', color:C.textMuted,
                          fontFamily:'Outfit', fontSize:12, cursor:'pointer',
                        }}>View Complaints</button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
};

// ─── Main App ─────────────────────────────────────────────────
const App = () => {
  const [active, setActive] = useState(() => localStorage.getItem('admin_tab') || 'overview');
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => { localStorage.setItem('admin_tab', active); }, [active]);

  // Tweaks
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentColor":"#6366f1","darkMode":true}/*EDITMODE-END*/;
  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const PAGE_TITLES = { overview:'Overview', complaints:'Complaints', analytics:'Analytics', map:'Hotspot Map', alerts:'Urgent Alerts', feedback:'Resident Feedback', sentiment:'Sentiment Analysis', fakedetect:'Fake Complaint Detection', users:'User Management', reports:'Reports' };

  const renderPage = () => {
    switch(active) {
      case 'overview': return <OverviewPage/>;
      case 'complaints': return <OverviewPage/>;
      case 'analytics': return <AnalyticsPage/>;
      case 'map': return <MapPage/>;
      case 'alerts': return <AlertsPage/>;
      case 'feedback': return <FeedbackPage/>;
      case 'sentiment': return <SentimentPage/>;
      case 'fakedetect': return <FakeDetectionPage/>;
      case 'users': return <UsersPage/>;
      case 'reports': return <ReportsPage/>;
      default: return <OverviewPage/>;
    }
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar active={active} setActive={setActive}/>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Header */}
        <div style={{
          height: 60, borderBottom: `1px solid ${C.border}`,
          display: 'flex', alignItems: 'center', padding: '0 24px',
          justifyContent: 'space-between', background: C.surface, flexShrink: 0,
        }}>
          <div>
            <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>{PAGE_TITLES[active]}</div>
            <div style={{ fontSize: 11, color: C.textMuted }}>Green Acres Housing Society · Lahore</div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{
              padding: '6px 14px', borderRadius: 20, fontSize: 11,
              background: C.greenGlow, color: C.green, fontWeight: 600,
              border: `1px solid ${C.green}44`,
            }}>● System Online</div>
            <div style={{
              width: 36, height: 36, borderRadius: '50%',
              background: 'linear-gradient(135deg, #ef4444, #f59e0b)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 12, fontWeight: 700, color: '#fff', position: 'relative',
            }}>
              3
              <div style={{
                position: 'absolute', top: -2, right: -2, width: 10, height: 10,
                borderRadius: '50%', background: C.red, border: `2px solid ${C.surface}`,
              }}/>
            </div>
          </div>
        </div>
        {/* Content */}
        <div style={{ flex: 1, overflow: 'auto', padding: 20 }}>
          {renderPage()}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
